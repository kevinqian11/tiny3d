# Tiny Tapeout project information
project:
  title:        "Tiny3D"      # Project title
  author:       "Kevin Qian"      # Your name
  discord:      "kevinqian11"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Render and control the rotation of the vertices of a 3D cube"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25200000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tiny3d_kevinqian11"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "draw.sv"
    - "color.sv"
    - "control.sv"
    - "rotation.sv"
    - "trig.sv"
    - "vertex.sv"
    - "vga_timings.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "left"
  ui[1]: "right"
  ui[2]: "up"
  ui[3]: "down"
  ui[4]: "leftz"
  ui[5]: "rightz"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "hsync"
  uo[1]: "vsync"
  uo[2]: "r[1]"
  uo[3]: "r[0]"
  uo[4]: "g[1]"
  uo[5]: "g[0]"
  uo[6]: "b[1]"
  uo[7]: "b[0]"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
